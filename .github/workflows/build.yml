name: Build Uelm Utility Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Fix Gradle Wrapper
      run: python3 fix-wrapper.py
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew build
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: uelm-utility-jar
        path: build/libs/uelm-utility-*.jar
        retention-days: 90
